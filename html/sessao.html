<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sessão - NeuroFoco</title>

  <link rel="stylesheet" href="../style.css">

  <style>
    /* Logo */
    .logo-container {
      text-align: center;
      margin-bottom: 15px;
    }

    .logo {
      width: 100%; /* reduzido para 60% do tamanho original */
      max-width: 70px; /* garante que não fique gigante em telas grandes */
      height: auto;
    }

    /* Mensagem motivacional */
    #mensagemFoco {
      font-size: 20px;
      margin-bottom: 10px;
      text-align: center;
    }

    /* Timer */
    #timer {
      font-size: 50px;
      text-align: center;
      margin-bottom: 10px;
    }

    /* Mini-desafio abaixo do botão */
    #miniDesafio {
      font-size: 18px;
      color: #666;
      text-align: center;
      margin-top: 10px;
      height: 20px;
    }

    /* Fade suave */
    .fade {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .show {
      opacity: 1;
    }

    /* Centralizar tudo no corpo */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    .audio-controls button.ativo {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <div class="logo-container">
    <img src="../img/logo.png" alt="NeuroFoco" class="logo">
  </div>

  <h1>Sessão de Foco</h1>
  <h2>Ambiente Sonoro</h2>
  <h3>Use Fones de Ouvido</h3>

  <p></p>

  <!-- Controle de áudio -->
  <div class="audio-controls">
    <button onclick="setAudio('off')">Off</button>
    <button onclick="setAudio('432')">432 Hz</button>
    <button onclick="setAudio('528')">528 Hz</button>
    <button onclick="setAudio('741')">741 Hz</button>
  </div>

  <audio id="audioPlayer" loop></audio>

  <!-- Mensagem motivacional -->
  <div id="mensagemFoco">Prepare sua mente...</div>

  <!-- Timer -->
  <div id="timer">00:00</div>

  <!-- Botão iniciar -->
  <button class="start" onclick="startTimer()">Iniciar</button>
  <p></p>
  

  <!-- Mini-desafio abaixo do botão -->
  <div id="miniDesafio"></div>

  <!-- JS externo -->
  <script src="sessao.js"></script>

</body>
</html>
